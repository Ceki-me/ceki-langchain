name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish-primary:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build langchain-ceki (primary)
        run: |
          cd packages/python
          python -m pip install --upgrade build
          python -m build

      - name: Publish langchain-ceki to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist
          attestations: false

  publish-squat:
    runs-on: ubuntu-latest
    needs: publish-primary
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build ceki-langchain (squat alias)
        run: |
          cd packages/python-squat
          python -m pip install --upgrade build
          python -m build

      - name: Publish ceki-langchain to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python-squat/dist
          attestations: false
